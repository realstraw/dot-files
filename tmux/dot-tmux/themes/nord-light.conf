# Custom nord-light theme for tmux
# Color palette (Nord):
#   nord0  #2E3440   nord4  #D8DEE9   nord8  #88C0D0   nord11 #BF616A
#   nord1  #3B4252   nord5  #E5E9F0   nord9  #81A1C1   nord14 #A3BE8C
#   nord3  #4C566A   nord6  #ECEFF4   nord10 #5E81AC

#+---------+
#+ Options +
#+---------+
set -g status-interval 1
set -g status on

#+--------+
#+ Status +
#+--------+
set -g status-justify left
set -g status-style bg="#D8DEE9",fg="#2E3440"

#+--- Bars ---+
set -g status-left "#[fg=#ECEFF4,bg=#5E81AC,bold] #S "
set -g status-right "#[fg=#2E3440,bg=#D8DEE9] %Y-%m-%d #[fg=#4C566A,bg=#D8DEE9]| #[fg=#2E3440,bg=#D8DEE9]%H:%M #[fg=#ECEFF4,bg=#5E81AC,bold] #H "

#+--- Windows ---+
set -g window-status-format " #[fg=#4C566A,bg=#D8DEE9]#I #[fg=#2E3440,bg=#D8DEE9]#W #F"
set -g window-status-current-format " #[fg=#ECEFF4,bg=#5E81AC,bold]#I #[fg=#ECEFF4,bg=#5E81AC]#W #F"
set -g window-status-separator ""

#+-------+
#+ Panes +
#+-------+
set -g pane-border-style bg=default,fg="#D8DEE9"
set -g pane-active-border-style bg=default,fg="#D08770"
set -g display-panes-colour "#D8DEE9"
set -g display-panes-active-colour "#D08770"

#+------------+
#+ Clock Mode +
#+------------+
setw -g clock-mode-colour "#5E81AC"

#+----------+
#+ Messages +
#+----------+
set -g message-style bg="#D8DEE9",fg="#5E81AC"
set -g message-command-style bg="#D8DEE9",fg="#5E81AC"
