#-----------------------------------------------------------------------------
#  DEFAULT CONFIGURATION
#------------------------------------------------------------------------------

# Change the prefix from ctrl-b to ctrl-a
set-option -g prefix C-a
set-option -g prefix2 C-\\

# Use vi key binding
set -g status-keys vi
setw -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-selection

# for easy reloading
bind r source-file ~/.tmux.conf

# proper terminfo for tmux + true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# fix the vim esc delay in tmux
set -s escape-time 0

# Set tmux history buffer size
set-option -g history-limit 50000

# enable mouse support (resize, scroll, click to select)
set -g mouse on

# let nvim see FocusGained/FocusLost (autoread, autosave on focus change)
set -g focus-events on

# image.nvim: allow Kitty graphics protocol passthrough, suppress activity flicker
set -gq allow-passthrough on
set -g visual-activity off

# system clipboard via OSC 52 (copy-mode `y` populates macOS clipboard)
set -g set-clipboard on

# windows/panes start at 1 to match keyboard layout
set -g base-index 1
setw -g pane-base-index 1

# keep window numbers contiguous when one is closed
set -g renumber-windows on

#------------------------------------------------------------------------------
#  Shortcuts
#------------------------------------------------------------------------------

# Bind D to load the dev mode
bind D source-file ~/.tmux/dev


#------------------------------------------------------------------------------
#  PANE
#------------------------------------------------------------------------------

bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

bind H swap-pane -s '{left-of}'
bind L swap-pane -s '{right-of}'
bind J swap-pane -D
bind K swap-pane -U

# jump to marked pane (mark/unmark with prefix m)
bind M select-pane -t '{marked}'

bind < join-pane -h -t :-
bind > join-pane -h -t :+

# break current pane into a new window
bind b break-pane

# vim-style resize (prefix C-h/j/k/l, repeatable)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# swap current window left/right (repeatable)
bind -r S-Left swap-window -d -t -1
bind -r S-Right swap-window -d -t +1

# layout selection (replaces M-1..M-5 defaults that conflict with terminal/OS)
bind C-q select-layout even-horizontal
bind C-w select-layout even-vertical
bind C-e select-layout main-horizontal
bind C-r select-layout main-vertical
bind C-t select-layout tiled

# main pane size for main-horizontal / main-vertical layouts (default 24 is too small)
set -g main-pane-height "70%"
set -g main-pane-width "60%"

# toggle to last session (vim-style alternate buffer)
bind Tab switch-client -l
bind u switch-client -l

# new-or-attach session named after current pane's working directory (taa-style)
bind C run-shell 'name=$(basename "#{pane_current_path}" | tr . -); tmux new-session -dA -s "$name" -c "#{pane_current_path}" && tmux switch-client -t "$name"'

set -g @nord_tmux_no_patched_font "1"

# make more space for left (session name)
set -g status-left-length 70
set -g status-right-length 70

# Theme: nord-tmux (dark) / nord-light (light), auto-detect macOS appearance.
# Reload with `prefix r` after switching system theme.
if-shell 'defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark' \
  "run '~/.tmux/themes/nord-tmux/nord.tmux'" \
  "source-file ~/.tmux/themes/nord-light.conf"

# Override current-window pill to turn Aurora orange when the window has a zoomed pane.
# Applied after the theme loads so it overrides the theme's own format.
if-shell 'defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark' \
  'set -g window-status-current-format " #[fg=black,bg=#{?window_zoomed_flag,##D08770,cyan}]#I#[fg=black,bg=#{?window_zoomed_flag,##D08770,cyan},nobold,noitalics,nounderscore] #[fg=black,bg=#{?window_zoomed_flag,##D08770,cyan}]#W #F"' \
  'set -g window-status-current-format " #[fg=#ECEFF4,bg=#{?window_zoomed_flag,##D08770,##5E81AC},bold]#I #[fg=#ECEFF4,bg=#{?window_zoomed_flag,##D08770,##5E81AC}]#W #F"'

# tmux-resurrect: save (prefix C-s) / restore (prefix R) sessions
# Restore rebound from default C-r to free C-r for select-layout main-vertical.
# tmux-continuum: auto-save every 15 min and auto-restore on server start
# Save state under XDG to keep ~/.tmux/ folded with stow (no writes inside dotfiles repo).
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @resurrect-restore 'R'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
run-shell '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
run-shell '~/.tmux/plugins/tmux-continuum/continuum.tmux'
