#-----------------------------------------------------------------------------
#  DEFAULT CONFIGURATION
#------------------------------------------------------------------------------

# Change the prefix from ctrl-b to ctrl-a
set-option -g prefix C-a
set-option -g prefix2 C-\\
# unbind C-b
# bind C-a send-prefix

# Use vi key binding
set -g status-keys vi
setw -g mode-keys vi
set-window-option -g mode-keys vi

# bind-key -t vi-copy 'v' begin-selection  ## deprecated in 2.4
# bind-key -t vi-copy 'y' copy-selection  ## deprecated in 2.4
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-selection

# for easy reloading
bind r source-file ~/.tmux.conf

# set to the correct terminal (needed for vim to display correct color)
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# fix the vim esc delay in tmux
set -s escape-time 0

# Set tmux history buffer size
set-option -g history-limit 5000

# # tell tmux to use the system clipboard
set-option -g default-command "reattach-to-user-namespace -l zsh"

# # Switch off the auto window name
# set-window-option -g automatic-rename off

#------------------------------------------------------------------------------
#  Shortcuts
#------------------------------------------------------------------------------

# Bind D to load the dev mode
bind D source-file ~/.tmux/dev


#------------------------------------------------------------------------------
#  PANE
#------------------------------------------------------------------------------

bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

bind H swap-pane -s '{left-of}'
bind L swap-pane -s '{right-of}'
bind J swap-pane -D
bind K swap-pane -U

bind < join-pane -h -t :-
bind > join-pane -h -t :+

set -g @nord_tmux_no_patched_font "1"

# make more space for left (session name)
set -g status-left-length 70
set -g status-right-length 70

# Theme: nord-tmux (dark) / nord-light (light), auto-detect macOS appearance.
# Reload with `prefix r` after switching system theme.
if-shell 'defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark' \
  "run -b '~/.tmux/themes/nord-tmux/nord.tmux'" \
  "source-file ~/.tmux/themes/nord-light.conf"
